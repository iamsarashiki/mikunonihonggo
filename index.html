<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARASHIKI x MIKU | N4 Protocol & Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <template id="card-template">
        <div class="swiper-slide">
            <div class="understood-label">MASTERED</div>
            <div class="card-actions">
                <button class="action-btn star-btn" title="Hafalkan">★</button>
                <button class="action-btn check-btn" title="Sudah Mengerti">✔</button>
            </div>
            <div class="card-label"></div>
            <p class="card-desc"></p>
            <div class="preview-box">
                <small>EXAMPLE_STREAM:</small>
                <p class="example-text"></p>
            </div>
            <button class="btn-learn-more">ACCESS_AI_DATA</button>
        </div>
    </template>

    <div class="scanlines"></div>

    <div class="app-container">
        <div id="detail-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="glitch-text-small" id="modal-title">AI_ANALYSIS_INITIATED</span>
                    <button onclick="closeModal()" class="btn-close">X</button>
                </div>
                <div class="modal-body">
                    <div id="ai-loading" class="hidden">MEMPROSES_DATA... <span class="blink">_</span></div>
                    <div id="ai-response"></div>
                    <div id="ai-generated-container"></div> 
                </div>
                <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center;">
                    <button id="gen-btn-ai" class="btn-ai-gen">GENERATE_NEW_CONTEXT [AI]</button>
                    <small>SARASHIKI_OS v2.0 // NEURO_LINK_ACTIVE</small>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="glitch-text-small" data-text="CHAPTERS">CHAPTERS</h2>
            </div>
            <nav id="chapter-list">
                <div class="chapter-item special-nav" onclick="showPage('generator')" style="margin-bottom: 10px;">
                    <span style="color:var(--miku-pink)">[AI]</span> POLA GENERATOR
                </div>
                <hr style="border: 0.5px solid #222; margin: 10px 0;">
                
                </nav>
            <div class="sync-section">
                <button onclick="exportData()" class="btn-sync">EXPORT DATA</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="hero-section">
                <div class="main-menu-glitch">
                    <h1 class="glitch-text" data-text="SARASHIKI">SARASHIKI</h1>
                    <h2 class="glitch-text-sub" data-text="N4 PROTOCOL">N4 PROTOCOL</h2>
                </div>
            </header>

            <section id="page-generator" class="sub-page hidden">
                <header class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <h2 class="glitch-text-sub" data-text="AI PATTERN LAB">AI PATTERN LAB</h2>
                        <p id="gen-status-text" style="color: #aaa; font-size: 0.9rem;">Pilih Bab & Pola untuk menghasilkan variasi baru.</p>
                    </div>
                    <button onclick="toggleGeneratorMinimize()" id="btn-minimize-gen" class="btn-minimize">
                        <span id="min-icon">[_]</span> MINIMIZE_INTERFACE
                    </button>
                </header>

                <div id="generator-main-ui">
                    <div class="generator-controls" style="background: rgba(255,255,255,0.03); padding: 20px; border: 1px solid #333; border-radius: 8px; margin-bottom: 25px;">
                        
                        <div class="control-group" style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <select id="select-bab-gen" onchange="checkPatternCount()" style="flex: 1; background: #000; color: var(--miku-cyan); border: 1px solid var(--miku-cyan); padding: 10px; font-family: 'Orbitron'; outline: none;">
                                </select>
                            
                            <button id="btn-advanced" onclick="toggleAdvancedOptions()" class="btn-advanced hidden">OPSI LANJUTAN [+]</button>
                        </div>

                        <div id="advanced-pattern-list" class="advanced-box hidden" style="background: rgba(0,0,0,0.5); border: 1px dashed #444; padding: 15px; margin-bottom: 15px; border-radius: 5px;">
                            <p style="font-size:0.75rem; color:var(--miku-pink); margin-bottom:10px; font-family: 'Orbitron';">PILIH_POLA_SPESIFIK:</p>
                            <div id="checkbox-container" class="checkbox-grid">
                                </div>
                        </div>

                        <button onclick="generateNewBatch()" class="btn-ai-gen-large" style="width: 100%; padding: 15px; background: var(--miku-cyan); color: #000; font-family: 'Orbitron'; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase;">
                            GENERATE POLA BARU
                        </button>

                    </div>
                </div>

                <div id="ai-result-grid" class="result-grid"></div>
            </section>

            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="pattern-slider">
                    <div class="swiper-slide empty-slide" style="display: flex; justify-content: center; align-items: center; height: 300px; border: 1px dashed #333;">
                        <p style="color: #666; font-family: 'Orbitron';">SILAKAN PILIH BAB DI SIDEBAR UNTUK MEMULAI</p>
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </main>
    </div>

    <div class="miku-player">
        <div class="player-content">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R5Z3R5Z3R5Z3R5Z3R5Z3R5Z3R5Z3R5Z3R5Z3R5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD1z/vVzH2Li3uMJI0/giphy.gif" class="miku-gif" alt="Miku Cyber">
            <div class="player-info">
                <div id="now-playing">SARASHIKI_SYSTEM: STANDBY</div>
                <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="grammar_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
