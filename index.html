<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARASHIKI_OS | Nihongo Lab</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --miku-cyan: #39c5bb;
            --miku-pink: #ff007f;
            --bg-dark: #000000;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; /* Mencegah seluruh halaman scroll */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Utama Terpusat */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: var(--miku-cyan);
            text-shadow: 0 0 15px var(--miku-cyan);
        }

        /* Area Scroll Tengah */
        #chapter-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: none; /* Firefox */
        }

        #chapter-list::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* Page Generator (Hidden by default) */
        #page-generator {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: var(--bg-dark);
            z-index: 10;
            overflow-y: auto;
        }

        .hidden { display: none !important; }

        /* UI Elements */
        .neon-select {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid var(--miku-cyan);
            color: #fff;
            font-family: 'Orbitron';
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--miku-pink);
            color: var(--miku-pink);
            font-family: 'Orbitron';
            cursor: pointer;
            text-shadow: 0 0 10px var(--miku-pink);
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-main:hover {
            background: var(--miku-pink);
            color: #000;
        }

        /* Modal / Pop-up */
        #detail-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid var(--miku-cyan);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(57,197,187,0.2);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            color: var(--miku-pink);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">SARASHIKI_OS</div>
            <p style="font-size: 0.7rem; color: #555;">v4.1 NEON_CENTRAL_PROTOCOL</p>
        </header>

        <div id="chapter-list">
            <p style="text-align:center; color: var(--miku-cyan);" class="blink">LOADING_SYSTEM...</p>
        </div>

        <div id="page-generator" class="hidden">
            <button class="btn-main" onclick="showPage('home')" style="border-color: #555; color: #555; text-shadow: none;">[ BACK_TO_MENU ]</button>
            
            <select id="select-bab-gen" class="neon-select">
                </select>
            
            <button class="btn-main" onclick="generateNewBatch()">GENERATE_NEW_BATCH</button>
            
            <div id="ai-result-grid">
                </div>
        </div>
    </div>

    <div id="detail-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="ai-response">
                </div>
            <div id="ai-generated-container"></div>
        </div>
    </div>

    <script src="grammar_data.js"></script>
    <script src="app.js"></script>

</body>
</html>
